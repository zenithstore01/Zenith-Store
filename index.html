<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: gold;
}

.section {
    background: #1e293b;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
}

button {
    background: #38bdf8;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.order-box {
    display: none;
    background: #020617;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}

.whatsapp-btn {
    margin-top: 15px;
    background: #25D366;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 ZENITH STORE 🔥</h1>

<div class="section">
<h2>📱 ANDROID PANELS</h2>

<div class="item">
<span>ANDROID DRAG HEADSHOT - Rs. 1,200</span>
<button onclick="selectProduct('ANDROID DRAG HEADSHOT - Rs.1200')">Select</button>
</div>

<div class="item">
<span>REDMI / POCO PANEL - Rs. 1,000</span>
<button onclick="selectProduct('REDMI POCO PANEL - Rs.1000')">Select</button>
</div>

<div class="item">
<span>NEW GULA PANEL - Rs. 1,500 😂</span>
<button onclick="selectProduct('NEW GULA PANEL - Rs.1500')">Select</button>
</div>

</div>

<!-- ORDER BOX -->
<div class="order-box" id="orderBox">
<h2>📲 Enter Your WhatsApp Number</h2>

<p id="productName"></p>

<input type="text" id="userNumber" placeholder="Your WhatsApp Number (98XXXXXXXX)">

<div class="whatsapp-btn" onclick="sendWhatsApp()">📩 Confirm Order</div>
</div>

</div>

<script>
let selectedProduct = "";

function selectProduct(product) {
    selectedProduct = product;
    document.getElementById("orderBox").style.display = "block";
    document.getElementById("productName").innerText = "Selected: " + product;
}

function sendWhatsApp() {
    let userNumber = document.getElementById("userNumber").value;

    if(userNumber === ""){
        alert("Please enter your WhatsApp number!");
        return;
    }

    let message = `Hello Zenith Store,%0A
Product: ${selectedProduct}%0A
Customer WhatsApp: ${userNumber}`;

    let ownerNumber = "9779748226283"; // YOUR NUMBER HERE

    window.open(`https://wa.me/${ownerNumber}?text=${message}`, "_blank");
}
</script>

</body>
  </html>
